naftiko: 1.0.0-alpha2
info:
  label: CodeProject.AI Server API — Vision-Scene
  description: 'CodeProject.AI Server API — Vision-Scene. 1 operations. Lead operation: Classify the scene depicted in an
    image. Self-contained Naftiko capability covering one Codeproject business surface.'
  tags:
  - Codeproject
  - Vision-Scene
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CODEPROJECT_API_KEY: CODEPROJECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: ai-server-vision-scene
    baseUri: http://localhost:32168
    description: CodeProject.AI Server API — Vision-Scene business capability. Self-contained, no shared references.
    resources:
    - name: v1-vision-scene
      path: /v1/vision/scene
      operations:
      - name: classifyscene
        method: POST
        description: Classify the scene depicted in an image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Disabled
      value: '{{env.CODEPROJECT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: ai-server-vision-scene-rest
    port: 8080
    description: REST adapter for CodeProject.AI Server API — Vision-Scene. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/vision/scene
      name: v1-vision-scene
      description: REST surface for v1-vision-scene.
      operations:
      - method: POST
        name: classifyscene
        description: Classify the scene depicted in an image
        call: ai-server-vision-scene.classifyscene
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ai-server-vision-scene-mcp
    port: 9090
    transport: http
    description: MCP adapter for CodeProject.AI Server API — Vision-Scene. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: classify-scene-depicted-image
      description: Classify the scene depicted in an image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ai-server-vision-scene.classifyscene
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
