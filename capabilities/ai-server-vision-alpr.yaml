  - type: http
    namespace: ai-server-vision-alpr
    baseUri: http://localhost:32168
    description: CodeProject.AI Server API — Vision-ALPR business capability. Self-contained, no shared references.
    resources:
    - name: v1-image-alpr
      path: /v1/image/alpr
      operations:
      - name: readlicenseplatelegacy
        method: POST
        description: Legacy ALPR route (deprecated alias of /v1/vision/alpr)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-vision-alpr
      path: /v1/vision/alpr
      operations:
      - name: readlicenseplate
        method: POST
        description: Detect and read license plates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
