  description: OAuth 2.0 protected REST API providing read access to CodeProject articles, forum messages, questions, and
    authenticated user data (answers, articles, blog posts, bookmarks, notifications, profile, reputation, tips). Supports
    Client Credentials, Authorization Code, and Implicit Grant flows. Tokens are issued by the CodeProject identity server
    and presented as Bearer tokens in the Authorization header.
