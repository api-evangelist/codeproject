- aid: codeproject:codeproject-ai-server
  name: CodeProject.AI Server API
  tags:
  - AI
  - Audio
  - Computer Vision
  - Face Recognition
  - Image Processing
  - License Plate Recognition
  - Object Detection
  - On-Premise
  - Self-Hosted
  - Text
  - Training
  type: REST
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: http://localhost:32168
  humanURL: https://www.codeproject.com/AI/
  description: Self-hosted AI service that exposes computer vision (object detection, scene, face, ALPR), image processing
    (background removal, cartoonise, portrait filter, super-resolution), audio classification, NLP (sentiment, summarization),
    and YOLOv5 training endpoints through a local HTTP REST API. All endpoints are POST and accept multipart uploads. The
    server runs on Windows, macOS, Linux, Raspberry Pi, Jetson, and OrangePi, plus Docker images, and integrates with Blue
    Iris, Home Assistant, and Agent DVR for surveillance use cases.
  properties:
