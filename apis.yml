description: CodeProject is a long-running online community for software developers founded in 1999, hosting hundreds of thousands
  of developer-contributed articles, tutorials, code samples, tips, and a Q&A forum across a broad range of programming topics.
  It exposes a public REST API at api.codeproject.com (V1 Beta) for read access to articles, forum messages, questions, and
  authenticated user data, secured by OAuth 2.0 Bearer Tokens. CodeProject also operates CodeProject.AI Server, a free, open-source,
  self-hosted AI service that exposes object detection, face recognition, license-plate reading (ALPR), scene classification,
  image processing, audio classification, text analytics, and YOLOv5 training through a local HTTP REST API. CodeProject.AI
  is widely integrated with home-automation and surveillance platforms (Blue Iris, Home Assistant, Agent DVR).
